services:
  fitbit-fetch-data:
    restart: unless-stopped
    build: .
    image: fitbit-fetch-data:local
    container_name: fitbit-fetch-data
    volumes:
      - ./logs:/app/logs
      - ./tokens:/app/tokens
      - /etc/timezone:/etc/timezone:ro
    environment:
      - FITBIT_LOG_FILE_PATH=/app/logs/fitbit.log
      - TOKEN_FILE_PATH=/app/tokens/fitbit.token
      - AUTO_DATE_RANGE=True      # Used for bulk update, read Historical Data Update section in README
      - FITBIT_RATE_LIMIT_BUFFER_SECONDS=300 # extra buffer after Fitbit 429 reset header
      - ENABLE_DERIVED_PIPELINE_HEALTH=True # Derived PipelineHealth measurement
      - ENABLE_DERIVED_RECOVERY_SCORE=True # Derived RecoveryScore measurement
      - ENABLE_DERIVED_TRAINING_LOAD=True # Derived TrainingLoad 
      - ENABLE_DERIVED_CARDIO_FITNESS=True
      - ENABLE_DERIVED_CORRELATION_SIGNALS=True
      - ENABLE_DERIVED_CORRELATION_MATRIX=True
      - ENABLE_DERIVED_ZSCORES=True
      - ENABLE_DERIVED_TREND_SIGNALS=True
      - ENABLE_DERIVED_READINESS_FLAGS=True
      - ENABLE_DERIVED_AUTO_BACKFILL=True
      - DERIVED_AUTO_BACKFILL_DAYS=120
      - DERIVED_AUTO_BACKFILL_MAX_DAYS_PER_RUN=120
      - ENABLE_DIRECT_CARDIO_FITNESS=True
      - ENABLE_DIRECT_ECG=True
      - ENABLE_DIRECT_IRN=True
      - ENABLE_DEVICE_SYNC_HEALTH=True
      - INFLUXDB_VERSION=1
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_USERNAME=fitbit_user
      - INFLUXDB_PASSWORD=fitbit_password
      - INFLUXDB_DATABASE=FitbitHealthStats
      - CLIENT_ID=23V329 # Change this to your client ID
      - CLIENT_SECRET=d9a29479cf6122504c54469e32170f9b # Change this to your client Secret
      - DEVICENAME=PixelWatch4 # Change this to your device name - e.g. "Charge5" without quotes
      - LOCAL_TIMEZONE=Automatic
    depends_on:
      - influxdb


  influxdb:
    restart: unless-stopped
    container_name: influxdb
    hostname: influxdb
    environment:
      - INFLUXDB_DB=FitbitHealthStats
      - INFLUXDB_USER=fitbit_user
      - INFLUXDB_USER_PASSWORD=fitbit_password
      - INFLUXDB_DATA_INDEX_VERSION=tsi1
      ###############################################################################
      # The following ENV variables are applicable for InfluxDB V3 - No effect for V1
      ###############################################################################
      # - INFLUXDB3_MAX_HTTP_REQUEST_SIZE=10485760
      # - INFLUXDB3_NODE_IDENTIFIER_PREFIX=Influxdb-node1
      # - INFLUXDB3_BUCKET=GarminStats
      # - INFLUXDB3_OBJECT_STORE=file
      # - INFLUXDB3_DB_DIR=/data
      # - INFLUXDB3_QUERY_FILE_LIMIT=5000 # this set to be a very high value if you want to view long term data
    ports:
      - '8086:8086' # Influxdb V3 should map as "8181:8181" (Change INFLUXDB_PORT to 8181 on fitbit-fetch-data appropriately for InfluxDB V3)
    volumes:
      - ./influxdb:/var/lib/influxdb # InfluxDB V3 bind mount should be set like - ./influxdb:/data if you set INFLUXDB3_DB_DIR=/data (instead of /var/lib/influxdb)
    image: 'influxdb:1.11' # You must change this to 'quay.io/influxdb/influxdb3-core:latest' for influxdb V3

  grafana:
    restart: unless-stopped
    container_name: grafana
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PLUGINS_PREINSTALL=marcusolsson-hourly-heatmap-panel
    volumes:
      - './grafana:/var/lib/grafana'
    ports:
      - '3000:3000'
    image: 'grafana/grafana:latest'
